<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Страница не найдена</title>
  <style>
    /* Светлая тема по умолчанию */
    :root{
      --bg:#ffffff;
      --fg:#000000;
      --muted:rgba(0,0,0,0.65);
      --btn-bg:#4CAF50;
      --btn-fg:#ffffff;
      --btn-shadow:rgba(0,0,0,0.08);
      --focus:rgba(0,0,0,0.15);
    }

    /* Тёмная тема */
    @media (prefers-color-scheme: dark){
      :root{
        --bg:#000000;
        --fg:#ffffff;
        --muted:rgba(255,255,255,0.65);
        --btn-bg:#4CAF50;
        --btn-fg:#ffffff;
        --btn-shadow:rgba(255,255,255,0.06);
        --focus:rgba(255,255,255,0.2);
      }
    }

    html,body{ height:100%; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      padding:32px;
      box-sizing:border-box;
      transition:background .25s ease, color .25s ease;
    }

    .container{
      max-width:920px;
      width:100%;
      text-align:center;
      display:flex;
      flex-direction:column;
      gap:28px;
      align-items:center;
    }

    .code{
      font-weight:800;
      font-size:clamp(48px, 12vw, 160px);
      line-height:1;
      letter-spacing:-4px;
      margin:0;
    }

    .message{
      font-size:clamp(16px, 2.5vw, 20px);
      margin:0 0 6px 0;
    }

    .hint{
      color:var(--muted);
      font-size:14px;
      margin:0 0 18px 0;
    }

    .btn{
      display:inline-block;
      text-decoration:none;
      color:var(--btn-fg);
      background:var(--btn-bg);
      padding:14px 26px;
      font-weight:600;
      border-radius:15px;
      box-shadow:0 6px 22px var(--btn-shadow);
      transition:transform .14s ease, box-shadow .14s ease, opacity .12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    footer{
      position:fixed;
      left:0;
      right:0;
      bottom:12px;
      text-align:center;
      font-size:13px;
      color:var(--muted);
      pointer-events:none;
    }

    @media (max-width:420px){
      .hint{ font-size:13px }
      .btn{ padding:12px 20px }
    }
  </style>
</head>
<body>
  <main class="container" role="main">
    <h1 class="code">404</h1>
    <p class="message">Страница не найдена</p>
    <p class="hint">Возможно, она была удалена или вы неправильно ввели адрес.</p>

    <a class="btn" href="/" role="button" aria-label="Перейти на главную">На главную</a>
  </main>

  <footer>
    NeonApps (neonapps.ru), 2025
  </footer>
</body>
</html>
