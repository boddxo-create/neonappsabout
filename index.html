<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonApps About</title>
    <link rel="stylesheet" href="/mainstyles.css">
    <meta name="theme-color" content="#00ff88">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NeonApps">
</head>
<body>
    <div class="menu-button" onclick="toggleSidebar()">
        <div class="menu-line"></div>
        <div class="menu-line"></div>
        <div class="menu-line"></div>
    </div>

    <div class="sidebar-overlay" onclick="closeSidebar()"></div>
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">NEONAPPS</div>
        </div>
        <nav class="sidebar-menu">
            <a href="https://neonapps.ru" class="menu-item" data-ru="Интернет" data-en="Internet">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                <span data-ru="Интернет" data-en="Internet">Интернет</span>
            </a>
            <a href="https://neonapps.ru/programs.php" class="menu-item">
                <svg viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg>
                <span data-ru="Программы" data-en="Apps">Программы</span>
            </a>
            <a href="https://neonapps.ru/customs.php" class="menu-item">
                <svg viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z"/></svg>
                <span data-ru="Кастомизация" data-en="Customization">Кастомизация</span>
            </a>
            <a href="https://neonapps.ru/games.php" class="menu-item">
                <svg viewBox="0 0 24 24"><path d="M21.58 16.09l-1.09-7.66C20.21 6.46 18.52 5 16.53 5H7.47C5.48 5 3.79 6.46 3.51 8.43l-1.09 7.66C2.2 17.63 3.39 19 4.94 19c.68 0 1.32-.27 1.8-.75L9 16h6l2.25 2.25c.48.48 1.13.75 1.8.75 1.56 0 2.75-1.37 2.53-2.91zM11 11H9v2H8v-2H6v-1h2V8h1v2h2v1zm4-1c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm2 3c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/></svg>
                <span data-ru="Игры" data-en="Games">Игры</span>
            </a>
        </nav>
        <div class="language-selector">
            <select id="langSelect" onchange="setLanguage(this.value)">
                <option value="ru">Русский</option>
                <option value="en">English</option>
            </select>
        </div>
    </div>

    <div class="animated-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <section class="hero-section">
        <h1 class="logo">NEONAPPS</h1>
        <p class="tagline" data-ru="Только проверенные приложения для старых версий Android" data-en="Only verified apps for old Android versions">Только проверенные приложения для старых версий Android</p>
        <button class="cta-button" onclick="window.location.href='https://neonapps.ru'">
            <span data-ru="Перейти на сайт" data-en="Go to Site">Перейти на сайт</span>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
        </button>
    </section>

    <script>
        let currentLang = 'ru';

        // Sidebar functions
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            const menuButton = document.querySelector('.menu-button');

            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
            menuButton.classList.toggle('active');
        }

        function closeSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            const menuButton = document.querySelector('.menu-button');

            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            menuButton.classList.remove('active');
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeSidebar();
                closeModal();
            }
        });

        // Language functions
        function detectBrowserLanguage() {
            const browserLang = navigator.language || navigator.userLanguage;
            return browserLang.startsWith('en') ? 'en' : 'ru';
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;

            const elements = document.querySelectorAll('[data-ru], [data-en]');
            elements.forEach(el => {
                const text = el.getAttribute(`data-${lang}`);
                if (text) {
                    if (el.children.length === 0) {
                        el.textContent = text;
                    } else {
                        const target = el.querySelector('span') || el;
                        if (target !== el) {
                            target.textContent = text;
                        }
                    }
                }
            });

            document.getElementById('langSelect').value = lang;
        }

        // Floating button logic
        window.addEventListener('scroll', () => {
            const floatingCta = document.getElementById('floatingCta');
            if (!floatingCta) return;
            if (window.scrollY > 500) {
                floatingCta.classList.add('visible');
            } else {
                floatingCta.classList.remove('visible');
            }
        });

        // Fetch recent apps
        async function loadRecentApps() {
            try {
                const response = await fetch('https://neonapps.ru/api.jpg?action=get_apps&limit=8&offset=0');
                const data = await response.json();

                if (data.status === 'success' && data.data) {
                    displayApps(data.data);
                } else {
                    showError();
                }
            } catch (error) {
                console.error('Error loading apps:', error);
                showError();
            }
        }

        function displayApps(apps) {
            const container = document.getElementById('recentApps');
            if (!container) return;
            container.innerHTML = '';

            apps.forEach((app, index) => {
                const appCard = document.createElement('div');
                appCard.className = 'app-card';
                appCard.style.animationDelay = `${index * 0.1}s`;
                appCard.onclick = () => openAppModal(app.id);

                appCard.innerHTML = `
                    <img src="${app.icon || 'https://via.placeholder.com/80'}" alt="${app.name}" class="app-icon" onerror="this.src='https://via.placeholder.com/80'">
                    <h3 class="app-name">${app.name}</h3>
                    ${app.developer ? `<p class="app-developer">${app.developer}</p>` : ''}
                `;

                container.appendChild(appCard);
            });
        }

        function showError() {
            const container = document.getElementById('recentApps');
            if (!container) return;
            container.innerHTML = `
                <div class="loading">
                    <p data-ru="Не удалось загрузить приложения" data-en="Failed to load apps">${currentLang === 'ru' ? 'Не удалось загрузить приложения' : 'Failed to load apps'}</p>
                </div>
            `;
        }

        // Modal functions
        async function openAppModal(appId) {
            const modal = document.getElementById('appModal');
            const modalBody = document.getElementById('modalBody');

            modalBody.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p data-ru="Загрузка..." data-en="Loading...">${currentLang === 'ru' ? 'Загрузка...' : 'Loading...'}</p>
                </div>
            `;

            modal.classList.add('active');

            try {
                const response = await fetch(`https://neonapps.ru/api.jpg?action=get_app&id=${appId}`);
                const data = await response.json();

                if (data.status === 'success' && data.data) {
                    displayAppDetails(data.data);
                } else {
                    modalBody.innerHTML = `<p>${currentLang === 'ru' ? 'Ошибка загрузки данных' : 'Error loading data'}</p>`;
                }
            } catch (error) {
                console.error('Error loading app details:', error);
                modalBody.innerHTML = `<p>${currentLang === 'ru' ? 'Ошибка загрузки данных' : 'Error loading data'}</p>`;
            }
        }

        function displayAppDetails(app) {
            const modalBody = document.getElementById('modalBody');
            
            const rating = app.rating ? parseFloat(app.rating).toFixed(1) : '0.0';
            const stars = '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating));

            let versionsHTML = '';
            if (app.versions && app.versions.length > 0) {
                versionsHTML = `
                    <div class="modal-versions">
                        <h3 data-ru="Доступные версии" data-en="Available Versions">${currentLang === 'ru' ? 'Доступные версии' : 'Available Versions'}</h3>
                        ${app.versions.map(v => `
                            <div class="version-item">
                                <div>
                                    <strong>${v.version_name || v.version}</strong>
                                    ${v.size ? `<span style="color: var(--secondary-color); margin-left: 10px;">(${v.size})</span>` : ''}
                                </div>
                                <a href="https://neonapps.ru/${v.file_path}" class="download-link" download>
                                    <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                                    <span data-ru="Скачать" data-en="Download">${currentLang === 'ru' ? 'Скачать' : 'Download'}</span>
                                </a>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            modalBody.innerHTML = `
                <div class="modal-header">
                    <img src="${app.icon || 'https://via.placeholder.com/100'}" alt="${app.name}" class="modal-icon" onerror="this.src='https://via.placeholder.com/100'">
                    <div class="modal-info">
                        <h2>${app.name}</h2>
                        ${app.developer ? `<p><strong data-ru="Разработчик:" data-en="Developer:">${currentLang === 'ru' ? 'Разработчик:' : 'Developer:'}</strong> ${app.developer}</p>` : ''}
                        ${app.category ? `<p><strong data-ru="Категория:" data-en="Category:">${currentLang === 'ru' ? 'Категория:' : 'Category:'}</strong> ${app.category}</p>` : ''}
                        <div class="modal-rating">
                            <span class="stars">${stars}</span>
                            <span>${rating}</span>
                        </div>
                    </div>
                </div>
                ${app.description ? `<div class="modal-description">${app.description}</div>` : ''}
                ${versionsHTML}
            `;
        }

        function closeModal() {
            document.getElementById('appModal').classList.remove('active');
        }

        // Close modal on overlay click
        const appModalEl = document.getElementById('appModal');
        if (appModalEl) {
            appModalEl.addEventListener('click', function(e) {
                if (e.target === this) {
                    closeModal();
                }
            });
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            const detectedLang = detectBrowserLanguage();
            setLanguage(detectedLang);
            loadRecentApps();
        });
    </script>
</body>
</html>
